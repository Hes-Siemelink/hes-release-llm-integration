# JSON Schema: https://raw.githubusercontent.com/digital-ai/release-api/main/synthetic-type-definitions/type-definition-schema.json
#
# Yaml-based format to define types in Release, as an alternative to synthetic.xml or type-definitions.xml
# This format is in Tech Preview in Release 23.3 and may change in future versions.

types:

  #
  # Configuration: Beads Server
  #

  code-agent.BeadsServer:
    extends: xlrelease.Configuration
    label: "Code Agent: Beads Server"
    description: Connection to a beads issue tracking server (Dolt-backed)

    hidden-properties:
      testConnectionScript: code-agent.BeadsTestConnection

    properties:
      host:
        label: Server Host
        description: Hostname of the Dolt SQL server running the beads database
        kind: string
        default: beads-server
        required: true
      port:
        label: Server Port
        description: Port of the Dolt SQL server
        kind: integer
        default: 3306
        required: true
      projectId:
        label: Project ID
        description: The beads project ID (from .beads/metadata.json on the host)
        kind: string
        required: true
      prefix:
        label: Issue Prefix
        description: Prefix for bead IDs (e.g., 'bc' produces bc-42)
        kind: string
        default: bc
      syncMode:
        label: Sync Mode
        description: How the container communicates with the beads server
        kind: enum
        default: direct
        enum-values:
          - direct
          - dolt
      actor:
        label: Actor Name
        description: Name used for git commits and bead audit trail
        kind: string
        default: beads-coder

  #
  # Configuration: LLM Model
  #

  code-agent.LLMServer:
    extends: xlrelease.Configuration
    label: "Code Agent: LLM Model"
    description: LLM provider configuration for the OpenCode coding agent

    hidden-properties:
      testConnectionScript: code-agent.LLMTestConnection

    properties:
      provider:
        label: Provider
        description: The LLM provider
        kind: enum
        default: anthropic
        required: true
        enum-values:
          - anthropic
          - openai
      apiKey:
        label: API Key
        description: API key for the LLM provider
        kind: string
        password: true
        required: true
      model:
        label: Model
        description: Model identifier (e.g., claude-sonnet-4-20250514, gpt-4o). Leave empty for provider default.
        kind: string
        required: false

  #
  # Base Task
  #

  code-agent.BaseTask:
    extends: xlrelease.ContainerTask
    virtual: true

    hidden-properties:
      image:
        default: "@registry.url@/@registry.org@/@project.name@:@project.version@"
        transient: true
      iconLocation: opencode.png
      taskColor: "#1A7F37"

  #
  # Task: Create Pull Request
  #

  code-agent.CreatePullRequest:
    extends: code-agent.BaseTask
    label: "Code Agent: Create Pull Request"
    description: Uses OpenCode AI agent to implement a bead story and create a pull request

    input-properties:
      beadsServer:
        label: Beads Server
        description: The beads server connection
        kind: ci
        referenced-type: code-agent.BeadsServer

      beadId:
        label: Bead ID
        description: The bead ID to work on (e.g., bc-42)
        kind: string
        required: true

      repoUrl:
        label: Repository URL
        description: GitHub repository URL to clone
        kind: string
        required: true

      repoBranch:
        label: Base Branch
        description: The branch to create the feature branch from
        kind: string
        default: main

      githubToken:
        label: GitHub Token
        description: GitHub personal access token (needs repo and PR permissions)
        kind: string
        password: true
        required: true

      llmServer:
        label: LLM Model
        description: The LLM model configuration for OpenCode
        kind: ci
        referenced-type: code-agent.LLMServer

      opencodeTimeout:
        label: OpenCode Timeout
        description: Maximum time in seconds for OpenCode to run
        kind: integer
        default: 1800
        required: false

      questionTimeout:
        label: Question Timeout
        description: Maximum time in seconds to wait for answers to agent questions
        kind: integer
        default: 3600
        required: false

      maxQuestionRounds:
        label: Max Question Rounds
        description: Maximum number of question-answer round trips
        kind: integer
        default: 5
        required: false

    output-properties:
      prUrl:
        label: Pull Request URL
        description: URL of the created pull request
        kind: string

      branchName:
        label: Branch Name
        description: Name of the feature branch that was created
        kind: string

      beadStatus:
        label: Bead Status
        description: Final status of the bead after task completion
        kind: string

  #
  # Scripts
  #

  code-agent.BaseScript:
    extends: xlrelease.RemoteScriptExecution
    virtual: true

    hidden-properties:
      image:
        default: "@registry.url@/@registry.org@/@project.name@:@project.version@"
        transient: true

    output-properties:
      commandResponse:
        kind: map_string_string

  code-agent.BeadsTestConnection:
    extends: code-agent.BaseScript

    input-properties:
      server:
        kind: ci
        referenced-type: code-agent.BeadsServer

  code-agent.LLMTestConnection:
    extends: code-agent.BaseScript

    input-properties:
      server:
        kind: ci
        referenced-type: code-agent.LLMServer
